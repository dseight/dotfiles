# Some options are copied from the tmux-sensible:
# https://github.com/tmux-plugins/tmux-sensible

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 50

# Increase scrollback buffer size
set -g history-limit 50000

# tmux messages are displayed for 4 seconds
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often
set -g status-interval 5

# Upgrade $TERM
set -g default-terminal "tmux-256color"
set-option -sa terminal-features ",wezterm:RGB"
set-option -sa terminal-features ",xterm-256color:RGB"

# Having first pane on zero is annoying when switching with prefix + num
set-option -g base-index 1

# Renumber windows on closing
set-option -g renumber-windows on

# Use vi keys to navigate in scroll mode
set -g mode-keys vi

# emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs

# Focus events enabled for terminals that support them
set -g focus-events on

# Do not auto-rename windows (use Ctrl + B, ',' to rename windows)
set-window-option -g automatic-rename off
set-option -g allow-rename off

# Use Ctrl + B, '/' for search
bind-key / copy-mode \; send-key ?

# Vim style pane selection (with prefix key)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-tmux-navigator suggests to use ps command to detect whether current pane
# is vim or not: https://github.com/christoomey/vim-tmux-navigator. But I don't
# like the idea of spawning processes for each keystroke.
set -g @is_vim "#{m|r:^n?vim$,#{pane_current_command}}"

# Use Alt-vim keys without prefix key to switch panes. If the current pane has
# a vim instance, send key there instead.
bind -n M-h if-shell -F "#{E:@is_vim}" 'send-keys M-h' 'select-pane -L'
bind -n M-j if-shell -F "#{E:@is_vim}" 'send-keys M-j' 'select-pane -D'
bind -n M-k if-shell -F "#{E:@is_vim}" 'send-keys M-k' 'select-pane -U'
bind -n M-l if-shell -F "#{E:@is_vim}" 'send-keys M-l' 'select-pane -R'

bind -T copy-mode-vi M-h select-pane -L
bind -T copy-mode-vi M-j select-pane -D
bind -T copy-mode-vi M-k select-pane -U
bind -T copy-mode-vi M-l select-pane -R

bind -T root F11 "run '~/.scripts/tmux-menu open'"

# Colors from:
# https://github.com/miikanissi/modus-themes.nvim/blob/master/lua/modus-themes/colors.lua

set -g @color_bg_main "#000000"
set -g @color_fg_main "#ffffff"
set -g @color_fg_dim "#989898"
set -g @color_fg_alt "#c6daff"
set -g @color_border "#646464"

set -g @color_red "#ff5f59"
set -g @color_red_warmer "#ff6b55"
set -g @color_red_cooler "#ff7f9f"
set -g @color_red_faint "#ff9580"
set -g @color_green "#44bc44"
set -g @color_green_warmer "#70b900"
set -g @color_green_cooler "#00c06f"
set -g @color_green_faint "#88ca9f"
set -g @color_yellow "#d0bc00"
set -g @color_yellow_warmer "#fec43f"
set -g @color_yellow_cooler "#dfaf7a"
set -g @color_yellow_faint "#d2b580"
set -g @color_gold "#c0965b"

set -g @color_bg_red_subtle "#620f2a"
set -g @color_bg_green_subtle "#00422a"
set -g @color_bg_yellow_subtle "#4a4000"

set -g @color_bg_red_nuanced "#2c0614"
set -g @color_bg_green_nuanced "#001904"
set -g @color_bg_yellow_nuanced "#222000"

set -g @color_bg_active "#303030"
set -g @color_fg_active "#f4f4f4"
set -g @color_bg_inactive "#282828"
set -g @color_fg_inactive "#bfc0c4"
set -g @color_bg_tab_bar "#313131"
set -g @color_bg_tab_current "#000000"

# Style

# See https://github.com/tmux/tmux/wiki/Formats . Also look at
# https://github.com/tmux/tmux/blob/master/options-table.c for the
# defaults, which might be handy (e.g., to keep the behavior for
# "pane-active-border-style").

set -g pane-border-style "fg=#{@color_bg_tab_bar}"
set -g pane-active-border-style "#{?pane_in_mode,fg=#{@color_yellow},#{?synchronize-panes,fg=#{@color_red},fg=#{@color_green}}}"

set -g menu-style "fg=#{@color_fg_inactive}"
set -g menu-selected-style "fg=#{@color_fg_main},bg=#{@color_bg_active}"
set -g menu-border-style "fg=#{@color_gold}"
set -g menu-border-lines "rounded"

set -g status-style "fg=#{@color_fg_inactive},bg=#{@color_bg_active}"
set -g status-left " [#S]  "
set -g message-style "fg=#{@color_yellow_warmer},bg=#{@color_bg_yellow_nuanced}"

set -g window-status-format " #I | #W "
# "*" ("current") is not displayed if it is the only window flag.
# If it is not the only window flag, then it is replaced by a space.
set -g window-status-current-format " #I | #W#{s|\\*| |;s|^ $||:#{window_flags}} "
set -g window-status-current-style "fg=#{@color_fg_active},bg=#{@color_bg_tab_current},bold"
set -g window-status-bell-style "fg=#{@color_bg_yellow_nuanced},bg=#{@color_yellow_cooler},bold"

# Color combinations for attention on status bar:
# - OK:     #[fg=#{@color_green_faint},bg=#{@color_bg_green_nuanced}]
# - WARN:   #[fg=#{@color_yellow_warmer},bg=#{@color_bg_yellow_nuanced}]
# - FAIL:   #[fg=#{@color_red},bg=#{@color_bg_red_nuanced}]
set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}%H:%M %d-%b-%y W%V "
# Slightly increase status-right-length from default 40
set -g status-right-length 50
